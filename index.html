<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Toàn Diện 3NF</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class='bx bx-store-alt'></i> Quản Lý Cửa Hàng</div>
    <ul class="nav-list" id="sidebar-menu"></ul>
</div>

<div class="main-content">
    <div class="header">
        <h2 id="page-title">Chào mừng đến với hệ thống</h2>
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="search-box" id="search-container" style="display: none;">
                <i class='bx bx-search'></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm dữ liệu..." onkeyup="searchTable()">
            </div>

            <div class="role-switcher">
                <span id="lbl-nv" style="color:#28a745;">Nhân viên</span>
                <label class="switch">
                    <input type="checkbox" id="role-toggle" checked>
                    <span class="sw-slider"></span>
                </label>
                <span id="lbl-admin" style="color:#007bff; font-weight:700;">Admin</span>
            </div>
            <button class="btn-add" id="btn-add-new" style="display:none;"><i class='bx bx-plus'></i> Thêm mới</button>
        </div>
    </div>
    
    <div class="table-wrapper" id="table-container">
        <div style="text-align: center; margin-top: 50px; color: #666;">
            <i class='bx bx-pointer' style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>Vui lòng chọn một danh mục bên trái để quản lý dữ liệu.</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
