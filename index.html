<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Toàn Diện</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg: #f4f7f6; --dark: #11101d; --primary: #007bff; --text: #333; --shadow: 0 4px 10px rgba(0,0,0,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--dark); color: #fff; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar .logo { font-size: 20px; font-weight: 700; padding: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2a2939; }
        .nav-list { list-style: none; padding: 10px; }
        .nav-list li a { display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: #fff; text-decoration: none; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; cursor: pointer; }
        .nav-list li a:hover, .nav-list li a.active { background: #fff; color: var(--dark); font-weight: 500; }

        /* MAIN */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border-radius: 10px; box-shadow: var(--shadow); margin-bottom: 20px; flex-shrink: 0; }
        .header h2 { font-size: 22px; }

        /* SEARCH BAR */
        .search-box { display: flex; align-items: center; background: #f4f7f6; border: 1px solid #ddd; border-radius: 20px; padding: 5px 15px; margin-right: 15px; transition: 0.3s; }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 5px rgba(0,123,255,0.3); }
        .search-box input { border: none; background: none; outline: none; padding: 5px; font-size: 14px; width: 200px; }
        .search-box i { color: #888; font-size: 18px; }

        /* ROLE SWITCHER */
        .role-switcher { display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 6px 14px; border-radius: 20px; border: 1px solid #e0e0e0; }
        .role-switcher span { font-size: 13px; font-weight: 500; transition: 0.2s; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .sw-slider { position: absolute; inset: 0; background: #28a745; border-radius: 99px; cursor: pointer; transition: 0.3s; }
        .sw-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .sw-slider { background: #007bff; }
        input:checked + .sw-slider:before { transform: translateX(20px); }

        /* BUTTONS & TABLE */
        .btn-add { background: var(--primary); color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500; transition: 0.2s; }
        .btn-add:hover { background: #0056b3; }
        .table-wrapper { background: #fff; padding: 20px; border-radius: 10px; box-shadow: var(--shadow); overflow-x: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; font-weight: 600; color: #444; }
        tbody tr:hover { background: #f1f4f8; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; margin-right: 10px; transition: 0.2s; }
        .btn-edit { color: #f39c12; }
        .btn-edit:hover { color: #d68910; }
        .btn-delete { color: #e74c3c; }
        .btn-delete:hover { color: #c0392b; }

        .swal2-input, .swal2-select { width: 85% !important; margin: 10px auto !important; font-size: 15px; border-radius: 6px; }

        /* DASHBOARD CSS */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 15px; border: 1px solid #eee; }
        .card-icon { font-size: 40px; color: var(--primary); background: #e6f2ff; padding: 15px; border-radius: 10px; }
        .card-icon.green { color: #28a745; background: #e8f8ec; }
        .card-info h3 { font-size: 26px; color: #333; margin-top: 5px;}
        .card-info p { color: #777; font-size: 13px; text-transform: uppercase; font-weight: 600;}
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: #fff; padding: 20px; border-radius: 10px; box-shadow: var(--shadow); border: 1px solid #eee; }
        .chart-box h4 { margin-bottom: 15px; color: #444; text-align: center; }

        /* POS CSS */
        .pos-container { display: flex; gap: 20px; height: 100%; }
        .pos-products { flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; align-content: start; overflow-y: auto; padding-right: 10px;}
        .product-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .product-card:hover { border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,123,255,0.2); transform: translateY(-3px); }
        .product-card h4 { font-size: 15px; color: #333; margin-bottom: 10px; }
        .product-card .price { color: #e74c3c; font-weight: 700; font-size: 16px; margin-bottom: 5px; }
        .product-card .stock { font-size: 12px; color: #28a745; background: #e8f8ec; padding: 3px 8px; border-radius: 10px; display: inline-block;}
        
        .pos-cart { flex: 1; background: #fff; border-radius: 10px; box-shadow: var(--shadow); border: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .cart-header { background: var(--dark); color: #fff; padding: 15px; text-align: center; font-weight: 600; font-size: 16px; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #eee; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .cart-item-info h5 { font-size: 14px; color: #333; margin-bottom: 5px; }
        .cart-item-info p { font-size: 13px; color: #e74c3c; font-weight: 600; }
        .cart-item-actions { display: flex; align-items: center; gap: 10px; }
        .cart-item-actions button { background: #f0f0f0; border: none; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .cart-item-actions button:hover { background: #ddd; }
        
        .cart-footer { padding: 20px; background: #f9f9f9; }
        .cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #333; }
        .cart-total span:last-child { color: #e74c3c; font-size: 22px; }
        .cart-form select, .cart-form input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        .btn-checkout { width: 100%; background: #28a745; color: #fff; border: none; padding: 15px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-checkout:hover { background: #218838; }
        .btn-checkout:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo"><i class='bx bx-store-alt'></i> Quản Lý Cửa Hàng</div>
    <ul class="nav-list" id="sidebar-menu"></ul>
</div>

<div class="main-content">
    <div class="header">
        <h2 id="page-title">Chào mừng đến với hệ thống</h2>
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="search-box" id="search-container" style="display: none;">
                <i class='bx bx-search'></i>
                <input type="text" id="search-input" placeholder="Tìm kiếm dữ liệu..." onkeyup="searchTable()">
            </div>

            <div class="role-switcher">
                <span id="lbl-nv" style="color:#28a745;">Nhân viên</span>
                <label class="switch">
                    <input type="checkbox" id="role-toggle" checked>
                    <span class="sw-slider"></span>
                </label>
                <span id="lbl-admin" style="color:#007bff; font-weight:700;">Admin</span>
            </div>
            <button class="btn-add" id="btn-add-new" style="display:none;"><i class='bx bx-plus'></i> Thêm mới</button>
        </div>
    </div>
    
    <div class="table-wrapper" id="table-container">
        <div style="text-align: center; margin-top: 50px; color: #666;">
            <i class='bx bx-pointer' style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>Vui lòng chọn một danh mục bên trái để quản lý dữ liệu.</p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://backendcsdl.onrender.com/api'; 

    const schemaConfig = {
        thongke: { title: 'Thống Kê Doanh Thu', icon: 'bx-pie-chart-alt-2', isDashboard: true },
        banhang: { title: 'Bán Hàng (POS)', icon: 'bx-cart-add', isPOS: true },
        loaisp: {
            title: 'Loại Sản Phẩm', endpoint: '/loaisp', primaryKey: 'MaLoai', icon: 'bx-category',
            fields: [ { key: 'MaLoai', label: 'Mã Loại', type: 'text' }, { key: 'TenLoai', label: 'Tên Loại', type: 'text' } ]
        },
        sanpham: {
            title: 'Sản Phẩm', endpoint: '/sanpham', primaryKey: 'MaSP', icon: 'bx-box',
            fields: [ { key: 'MaSP', label: 'Mã Sản Phẩm', type: 'text' }, { key: 'Ten', label: 'Tên Sản Phẩm', type: 'text' }, { key: 'MoTa', label: 'Mô Tả', type: 'text' }, { key: 'DonGia', label: 'Đơn Giá', type: 'number' }, { key: 'MaLoai', label: 'Loại Sản Phẩm', type: 'select', sourceEndpoint: '/loaisp', valueKey: 'MaLoai', labelKey: 'TenLoai' } ]
        },
        donvicungcap: {
            title: 'Đơn Vị Cung Cấp', endpoint: '/donvicungcap', primaryKey: 'MaDV', icon: 'bx-buildings',
            fields: [ { key: 'MaDV', label: 'Mã ĐVCC', type: 'text' }, { key: 'Ten', label: 'Tên Đơn Vị', type: 'text' }, { key: 'DiaChi', label: 'Địa Chỉ', type: 'text' } ]
        },
        khohang: {
            title: 'Kho Hàng', endpoint: '/khohang', primaryKey: 'MaKho', icon: 'bx-home-alt',
            fields: [ { key: 'MaKho', label: 'Mã Kho', type: 'text' }, { key: 'DiaChi', label: 'Địa Chỉ Kho', type: 'text' } ]
        },
        chinhanh: {
            title: 'Chi Nhánh', endpoint: '/chinhanh', primaryKey: 'MaCN', icon: 'bx-git-branch',
            fields: [ { key: 'MaCN', label: 'Mã Chi Nhánh', type: 'text' }, { key: 'Ten', label: 'Tên Chi Nhánh', type: 'text' }, { key: 'DiaChi', label: 'Địa Chỉ', type: 'text' } ]
        },
        vitri: {
            title: 'Vị Trí Công Việc', endpoint: '/vitri', primaryKey: 'MaViTri', icon: 'bx-briefcase',
            fields: [ { key: 'MaViTri', label: 'Mã Vị Trí', type: 'text' }, { key: 'TenViTri', label: 'Tên Vị Trí', type: 'text' }, { key: 'LuongTheoGio', label: 'Lương / Giờ', type: 'number' } ]
        },
        khachhang: {
            title: 'Khách Hàng', endpoint: '/khachhang', primaryKey: 'MaKH', icon: 'bx-group',
            fields: [ { key: 'MaKH', label: 'Mã KH', type: 'text' }, { key: 'Ten', label: 'Tên KH', type: 'text' }, { key: 'TheTichDiem', label: 'Thẻ Tích Điểm', type: 'text' }, { key: 'Email', label: 'Email', type: 'email' }, { key: 'SoNha', label: 'Số Nhà', type: 'text' }, { key: 'Phuong', label: 'Phường', type: 'text' }, { key: 'Quan', label: 'Quận', type: 'text' }, { key: 'ThanhPho', label: 'Thành Phố', type: 'text' } ]
        },
        nhanvien: {
            title: 'Nhân Viên', endpoint: '/nhanvien', primaryKey: 'MaNV', icon: 'bx-id-card',
            fields: [ { key: 'MaNV', label: 'Mã NV', type: 'text' }, { key: 'HoVaTen', label: 'Họ & Tên', type: 'text' }, { key: 'Email', label: 'Email', type: 'email' }, { key: 'SoDienThoai', label: 'Số Điện Thoại', type: 'text' }, { key: 'DiaChi', label: 'Địa Chỉ', type: 'text' }, { key: 'ThoiGianLamViecTrongNgay', label: 'Giờ làm/Ngày', type: 'number' }, { key: 'MaCN', label: 'Thuộc Chi Nhánh', type: 'select', sourceEndpoint: '/chinhanh', valueKey: 'MaCN', labelKey: 'Ten' }, { key: 'MaViTri', label: 'Vị Trí Công Việc', type: 'select', sourceEndpoint: '/vitri', valueKey: 'MaViTri', labelKey: 'TenViTri' }, { key: 'MaNguoiQuanLy', label: 'Mã NQL (Gõ tay hoặc bỏ trống)', type: 'text' } ]
        },
        tonkho: {
            title: 'Tồn Kho', endpoint: '/tonkho', primaryKey: 'MaSP', icon: 'bx-package',
            fields: [ { key: 'MaKho', label: 'Kho Hàng', type: 'select', sourceEndpoint: '/khohang', valueKey: 'MaKho', labelKey: 'DiaChi' }, { key: 'MaSP', label: 'Sản Phẩm', type: 'select', sourceEndpoint: '/sanpham', valueKey: 'MaSP', labelKey: 'Ten' }, { key: 'SoLuong', label: 'Số Lượng Tồn', type: 'number' }, { key: 'ViTriHang', label: 'Kệ/Ngăn', type: 'text' }, { key: 'ViTriKhu', label: 'Khu vực', type: 'number' } ]
        },
        donhang: {
            title: 'Lịch sử Đơn Hàng', endpoint: '/donhang', primaryKey: 'MaDonHang', icon: 'bx-receipt',
            fields: [ { key: 'MaDonHang', label: 'Mã Đơn', type: 'text' }, { key: 'NgayMua', label: 'Ngày Mua', type: 'date' }, { key: 'PhuongThucThanhToan', label: 'Thanh Toán', type: 'text' }, { key: 'MaKH', label: 'Khách Hàng', type: 'select', sourceEndpoint: '/khachhang', valueKey: 'MaKH', labelKey: 'Ten' }, { key: 'MaNV', label: 'Nhân Viên Bán', type: 'select', sourceEndpoint: '/nhanvien', valueKey: 'MaNV', labelKey: 'HoVaTen' } ]
        }
    };

    const STAFF_MENUS = ['banhang', 'sanpham', 'khachhang', 'tonkho', 'donhang'];
    const ADMIN_MENUS = Object.keys(schemaConfig);

    let currentEntityKey = null;
    let isAdmin = true;
    let chartInstance1 = null;
    let chartInstance2 = null;

    // Các biến cho POS
    let cart = [];
    let posProducts = [];
    let posCustomers = [];
    let posStaffs = [];

    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2500 });
    const formatVND = (num) => Number(num).toLocaleString('vi-VN') + ' đ';

    // Sinh menu
    const sidebarMenu = document.getElementById('sidebar-menu');
    for (const [key, config] of Object.entries(schemaConfig)) {
        sidebarMenu.innerHTML += `<li id="li-${key}"><a onclick="loadEntity('${key}')" id="menu-${key}"><i class='bx ${config.icon}'></i> ${config.title}</a></li>`;
    }

    async function loadEntity(key) {
        document.querySelectorAll('.nav-list a').forEach(el => el.classList.remove('active'));
        document.getElementById(`menu-${key}`).classList.add('active');

        currentEntityKey = key;
        const config = schemaConfig[key];

        document.getElementById('page-title').innerText = config.title;
        document.getElementById('search-container').style.display = 'none';
        document.getElementById('btn-add-new').style.display = 'none';
        
        if (config.isDashboard) return renderDashboard();
        if (config.isPOS) return renderPOS(); 

        document.getElementById('search-container').style.display = 'flex';
        document.getElementById('search-input').value = '';
        if (isAdmin && key !== 'donhang') document.getElementById('btn-add-new').style.display = 'flex'; 

        document.getElementById('table-container').innerHTML = `<div style="text-align:center; padding: 40px;"><i class='bx bx-loader bx-spin' style="font-size: 30px; color: var(--primary);"></i><p style="margin-top:10px;">Đang tải dữ liệu ${config.title}...</p></div>`;

        try {
            const res = await axios.get(`${API_URL}${config.endpoint}`);
            const data = res.data;

            let tableHTML = `<table><thead><tr>`;
            config.fields.forEach(f => tableHTML += `<th>${f.label}</th>`);
            if (isAdmin) tableHTML += `<th width="100">Hành động</th>`;
            tableHTML += `</tr></thead><tbody>`;

            if (data.length === 0) {
                tableHTML += `<tr><td colspan="${config.fields.length + (isAdmin ? 1 : 0)}" style="text-align:center; color:#999; padding:20px;">Chưa có dữ liệu nào trong bảng này.</td></tr>`;
            } else {
                data.forEach(item => {
                    tableHTML += `<tr>`;
                    config.fields.forEach(f => {
                        let cellValue = item[f.key] !== null && item[f.key] !== undefined ? item[f.key] : '';
                        if(f.type === 'date' && cellValue) cellValue = new Date(cellValue).toLocaleDateString('vi-VN');
                        if (f.label.includes("Giá") && cellValue !== '') cellValue = formatVND(cellValue);
                        tableHTML += `<td>${cellValue}</td>`;
                    });

                    if (isAdmin) {
                        const idVal = item[config.primaryKey];
                        const encodedItem = encodeURIComponent(JSON.stringify(item));
                        tableHTML += `
                            <td>
                                ${key !== 'donhang' ? `<button class="action-btn btn-edit" title="Sửa" onclick="showModal(false, '${encodedItem}')"><i class='bx bx-edit'></i></button>` : ''}
                                <button class="action-btn btn-delete" title="Xóa" onclick="deleteRecord('${idVal}')"><i class='bx bx-trash'></i></button>
                            </td>`;
                    }
                    tableHTML += `</tr>`;
                });
            }
            tableHTML += `</tbody></table>`;
            document.getElementById('table-container').innerHTML = tableHTML;
        } catch (error) {
            document.getElementById('table-container').innerHTML = `<div style="text-align:center; color:#e74c3c; padding:20px;"><i class='bx bx-error-alt' style="font-size: 40px;"></i><p>Lỗi kết nối đến Backend: ${error.message}</p></div>`;
        }
    }

    async function renderPOS() {
        document.getElementById('table-container').innerHTML = `<div style="text-align:center; padding: 40px;"><i class='bx bx-loader bx-spin' style="font-size: 30px; color: var(--primary);"></i><p style="margin-top:10px;">Đang tải máy POS...</p></div>`;
        cart = []; 
        
        try {
            const [resSP, resKH, resNV] = await Promise.all([
                axios.get(`${API_URL}/pos/sanpham`),
                axios.get(`${API_URL}/khachhang`),
                axios.get(`${API_URL}/nhanvien`)
            ]);
            
            posProducts = resSP.data;
            posCustomers = resKH.data;
            posStaffs = resNV.data;

            let posHTML = `
                <div class="pos-container">
                    <div class="pos-products">
                        ${posProducts.map(sp => `
                            <div class="product-card" onclick="addToCart('${sp.MaSP}', '${sp.Ten}', ${sp.DonGia}, ${sp.TongTonKho})">
                                <h4>${sp.Ten}</h4>
                                <div class="price">${formatVND(sp.DonGia)}</div>
                                <div class="stock">Kho: ${sp.TongTonKho}</div>
                            </div>
                        `).join('')}
                        ${posProducts.length === 0 ? '<p style="color:#999; grid-column: 1/-1; text-align:center; margin-top:50px;">Hiện tại kho đang trống, không có sản phẩm để bán.</p>' : ''}
                    </div>

                    <div class="pos-cart">
                        <div class="cart-header">Giỏ Hàng Của Khách</div>
                        <div class="cart-items" id="cart-items">
                            <div style="text-align:center; color:#999; margin-top:20px;">Giỏ hàng đang trống</div>
                        </div>
                        <div class="cart-footer">
                            <div class="cart-total">
                                <span>Tổng cộng:</span>
                                <span id="cart-total-price">0 đ</span>
                            </div>
                            <div class="cart-form">
                                <select id="pos-khachhang">
                                    <option value="" disabled selected>-- Chọn Khách Hàng --</option>
                                    ${posCustomers.map(kh => `<option value="${kh.MaKH}">${kh.Ten} (${kh.MaKH})</option>`).join('')}
                                </select>
                                <select id="pos-nhanvien">
                                    <option value="" disabled selected>-- Nhân Viên Bán --</option>
                                    ${posStaffs.map(nv => `<option value="${nv.MaNV}">${nv.HoVaTen} (${nv.MaNV})</option>`).join('')}
                                </select>
                                <select id="pos-pttt">
                                    <option value="Tiền mặt" selected>Thanh toan: Tiền mặt</option>
                                    <option value="Chuyển khoản">Thanh toan: Chuyển khoản</option>
                                    <option value="Quẹt thẻ">Thanh toan: Quẹt thẻ</option>
                                </select>
                                <button class="btn-checkout" id="btn-checkout" onclick="processCheckout()" disabled><i class='bx bx-check-circle'></i> THANH TOÁN</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('table-container').innerHTML = posHTML;
        } catch (error) {
            document.getElementById('table-container').innerHTML = `<div style="text-align:center; color:#e74c3c; padding:20px;"><i class='bx bx-error-alt' style="font-size: 40px;"></i><p>Lỗi tải POS: ${error.message}</p></div>`;
        }
    }

    function addToCart(maSP, ten, donGia, tonKho) {
        const existItem = cart.find(item => item.MaSP === maSP);
        if (existItem) {
            if (existItem.SoLuongMua < tonKho) {
                existItem.SoLuongMua++;
            } else {
                Toast.fire({ icon: 'warning', title: 'Đã đạt giới hạn tồn kho!' });
            }
        } else {
            cart.push({ MaSP: maSP, Ten: ten, DonGiaBan: donGia, SoLuongMua: 1, TonKho: tonKho });
        }
        updateCartUI();
    }

    function changeQty(maSP, delta) {
        const itemIndex = cart.findIndex(item => item.MaSP === maSP);
        if (itemIndex > -1) {
            const newQty = cart[itemIndex].SoLuongMua + delta;
            if (newQty > cart[itemIndex].TonKho) {
                Toast.fire({ icon: 'warning', title: 'Không đủ hàng trong kho!' });
                return;
            }
            if (newQty <= 0) {
                cart.splice(itemIndex, 1);
            } else {
                cart[itemIndex].SoLuongMua = newQty;
            }
            updateCartUI();
        }
    }

    function updateCartUI() {
        const cartItemsDiv = document.getElementById('cart-items');
        const btnCheckout = document.getElementById('btn-checkout');
        const totalPriceEl = document.getElementById('cart-total-price');

        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<div style="text-align:center; color:#999; margin-top:20px;">Giỏ hàng đang trống</div>';
            totalPriceEl.innerText = '0 đ';
            btnCheckout.disabled = true;
            return;
        }

        let html = '';
        let total = 0;
        cart.forEach(item => {
            const itemTotal = item.DonGiaBan * item.SoLuongMua;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h5>${item.Ten}</h5>
                        <p>${formatVND(item.DonGiaBan)}</p>
                    </div>
                    <div class="cart-item-actions">
                        <button onclick="changeQty('${item.MaSP}', -1)">-</button>
                        <span>${item.SoLuongMua}</span>
                        <button onclick="changeQty('${item.MaSP}', 1)">+</button>
                    </div>
                </div>
            `;
        });
        cartItemsDiv.innerHTML = html;
        totalPriceEl.innerText = formatVND(total);
        btnCheckout.disabled = false;
        cartItemsDiv.scrollTop = cartItemsDiv.scrollHeight;
    }

    async function processCheckout() {
        const maKH = document.getElementById('pos-khachhang').value;
        const maNV = document.getElementById('pos-nhanvien').value;
        const pttt = document.getElementById('pos-pttt').value;

        if (!maKH) return Swal.fire('Lỗi', 'Vui lòng chọn Khách hàng!', 'warning');
        if (!maNV) return Swal.fire('Lỗi', 'Vui lòng chọn Nhân viên bán!', 'warning');

        let tongTien = 0;
        cart.forEach(item => tongTien += (item.DonGiaBan * item.SoLuongMua));

        let maDonHangMoi = null;
        try {
            // Xin cấp trước 1 mã đơn hàng từ Backend
            const resId = await axios.get(`${API_URL}/donhang/generate-id`);
            maDonHangMoi = resId.data.newId;
        } catch (error) {
            return Swal.fire('Lỗi', 'Không thể tạo mã đơn hàng mới', 'error');
        }

        // --- NẾU LÀ CHUYỂN KHOẢN (AUTO-CONFIRM SEPAY) ---
        if (pttt === 'Chuyển khoản') {
            const BANK_ID = 'MB'; 
            const STK = '0975810393'; 
            const TEN_TK = 'NGUYEN DINH CUONG QUOC'; 
            
            // TRỌNG TÂM Ở ĐÂY: Nội dung QR phải chứa MÃ ĐƠN HÀNG (VD: Thanh toan DH260401-001)
            const noiDung = `Thanh toan ${maDonHangMoi}`; 
            
            const qrUrl = `https://img.vietqr.io/image/${BANK_ID}-${STK}-compact2.png?amount=${tongTien}&addInfo=${noiDung}&accountName=${TEN_TK}`;

            let checkInterval;

            const result = await Swal.fire({
                title: `Mã Đơn: ${maDonHangMoi}`,
                html: `Vui lòng quét QR để thanh toán <b>${formatVND(tongTien)}</b><br><br>
                       <span style="color:#007bff; font-weight:600; font-size:16px;">
                           <i class='bx bx-loader-circle bx-spin' ></i> Hệ thống đang tự động chờ tiền vào...
                       </span>`,
                imageUrl: qrUrl,
                imageWidth: 300,
                imageHeight: 300,
                showCancelButton: true,
                showConfirmButton: false, // Ẩn nút OK đi, bắt chờ máy xác nhận
                cancelButtonText: 'Hủy Đơn Này',
                allowOutsideClick: false,
                didOpen: () => {
                    checkInterval = setInterval(async () => {
                        try {
                            const checkRes = await axios.get(`${API_URL}/check-payment/${maDonHangMoi}`);
                            if (checkRes.data.isPaid) {
                                clearInterval(checkInterval);
                                // Truyền thêm tín hiệu 'paid' để biết là đóng do đã trả tiền
                                Swal.close({ isPaid: true }); 
                            }
                        } catch(e) {}
                    }, 3000); 
                },
                willClose: () => clearInterval(checkInterval)
            });

            // Lấy tín hiệu truyền về từ Swal.close
            const closeReason = result.dismiss;
            const customValue = result.value;

            // NẾU BỊ ĐÓNG MÀ KHÔNG PHẢI DO ĐÃ TRẢ TIỀN (ví dụ: nhân viên bấm nút Hủy)
            if (closeReason && !(customValue && customValue.isPaid)) {
                return; // Thoát, không lưu đơn
            }
        }

        // ĐẾN ĐÂY: Có nghĩa là Khách trả Tiền Mặt HOẶC Auto-Confirm đã xác nhận Tiền vào TK
        const btnCheckout = document.getElementById('btn-checkout');
        btnCheckout.disabled = true;
        btnCheckout.innerHTML = `<i class='bx bx-loader bx-spin'></i> Đang lưu đơn...`;

        try {
            const payload = {
                MaDonHang: maDonHangMoi, // Gửi kèm mã đã xí từ trước để lưu DB
                NgayMua: new Date().toISOString().split('T')[0], 
                PhuongThucThanhToan: pttt,
                MaKH: maKH,
                MaNV: maNV,
                ChiTiet: cart.map(item => ({
                    MaSP: item.MaSP,
                    SoLuongMua: item.SoLuongMua,
                    DonGiaBan: item.DonGiaBan,
                    GiaVonTrungBinh: 0 
                }))
            };

            const res = await axios.post(`${API_URL}/donhang`, payload);
            
            Swal.fire({ icon: 'success', title: 'Giao dịch thành công!', text: res.data.message, timer: 3000, showConfirmButton: false });
            renderPOS(); // Dọn dẹp giỏ hàng, cập nhật lại kho đồ chơi

        } catch (error) {
            Swal.fire('Lỗi lưu đơn', error.response?.data?.error || error.message, 'error');
            btnCheckout.disabled = false;
            btnCheckout.innerHTML = `<i class='bx bx-check-circle'></i> THANH TOÁN`;
        }
    }

    async function renderDashboard() {
        document.getElementById('table-container').innerHTML = `<div style="text-align:center; padding: 40px;"><i class='bx bx-loader bx-spin' style="font-size: 30px; color: var(--primary);"></i><p style="margin-top:10px;">Đang tổng hợp dữ liệu thống kê...</p></div>`;

        try {
            const res = await axios.get(`${API_URL}/thongke`);
            const data = res.data;

            if(chartInstance1) chartInstance1.destroy();
            if(chartInstance2) chartInstance2.destroy();

            document.getElementById('table-container').innerHTML = `
                <div class="dashboard-cards">
                    <div class="card">
                        <div class="card-icon"><i class='bx bx-money'></i></div>
                        <div class="card-info"><p>Tổng Doanh Thu Hệ Thống</p><h3>${formatVND(data.tongDoanhThu)}</h3></div>
                    </div>
                    <div class="card">
                        <div class="card-icon green"><i class='bx bx-shopping-bag'></i></div>
                        <div class="card-info"><p>Tổng Đơn Hàng Đã Bán</p><h3>${data.tongDonHang} Đơn</h3></div>
                    </div>
                </div>
                <div class="charts-container">
                    <div class="chart-box"><h4>Doanh Thu Theo Tất Cả Chi Nhánh</h4><canvas id="branchChart"></canvas></div>
                    <div class="chart-box"><h4>Khách Hàng Tập Trung (Tất Cả Thành Phố)</h4><canvas id="cityChart"></canvas></div>
                </div>
            `;

            const ctx1 = document.getElementById('branchChart').getContext('2d');
            chartInstance1 = new Chart(ctx1, { type: 'bar', data: { labels: data.chiNhanh.map(i => i.ChiNhanh), datasets: [{ label: 'Doanh thu (VNĐ)', data: data.chiNhanh.map(i => i.DoanhThu), backgroundColor: '#007bff' }] }});
            
            const ctx2 = document.getElementById('cityChart').getContext('2d');
            chartInstance2 = new Chart(ctx2, { type: 'doughnut', data: { labels: data.thanhPho.map(i => i.ThanhPho), datasets: [{ data: data.thanhPho.map(i => i.DoanhThu), backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#4bc0c0', '#ff9f40', '#9966ff'] }] }});
        } catch (error) { document.getElementById('table-container').innerHTML = `<div style="text-align:center; color:#e74c3c; padding:20px;"><i class='bx bx-error-alt' style="font-size: 40px;"></i><p>Lỗi tải thống kê: ${error.message}</p></div>`; }
    }

    async function showModal(isAdd = true, encodedData = null) {
        const config = schemaConfig[currentEntityKey];
        const itemData = encodedData ? JSON.parse(decodeURIComponent(encodedData)) : {};

        if (config.fields.some(f => f.type === 'select')) Swal.fire({ title: 'Đang tải...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        let htmlInputs = '';
        for (let i = 0; i < config.fields.length; i++) {
            const f = config.fields[i];
            const isPK = (f.key === config.primaryKey);
            if (isAdd && isPK && currentEntityKey !== 'tonkho') continue; 

            let val = isAdd ? '' : (itemData[f.key] || '');
            if(!isAdd && f.type === 'date' && val) val = new Date(val).toISOString().split('T')[0];
            let inputState = (!isAdd && isPK) ? 'disabled style="background:#eee; cursor:not-allowed;"' : '';

            if (f.type === 'select') {
                try {
                    const resD = await axios.get(`${API_URL}${f.sourceEndpoint}`);
                    htmlInputs += `<select id="swal-${f.key}" class="swal2-select" style="display:flex; height:45px;" ${inputState}><option value="" disabled ${!val ? 'selected' : ''}>-- Chọn ${f.label} --</option>${resD.data.map(opt => `<option value="${opt[f.valueKey]}" ${String(opt[f.valueKey])===String(val)?'selected':''}>${opt[f.labelKey]} (${opt[f.valueKey]})</option>`).join('')}</select>`;
                } catch (err) { htmlInputs += `<input id="swal-${f.key}" class="swal2-input" value="Lỗi tải dữ liệu" disabled>`; }
            } else {
                htmlInputs += `<input id="swal-${f.key}" type="${f.type}" class="swal2-input" placeholder="${f.label}" value="${val}" ${inputState}>`;
            }
        }

        Swal.close();
        const { value: formValues } = await Swal.fire({
            title: isAdd ? `Thêm mới ${config.title}` : `Sửa ${config.title}`, html: htmlInputs, focusConfirm: false, showCancelButton: true, confirmButtonText: 'Lưu dữ liệu', cancelButtonText: 'Hủy', width: '600px', preConfirm: () => {
                let data = {};
                config.fields.forEach(f => { const el = document.getElementById(`swal-${f.key}`); if(el) data[f.key] = el.value; });
                return data;
            }
        });

        if (formValues) {
            try {
                if (isAdd) await axios.post(`${API_URL}${config.endpoint}`, formValues);
                else await axios.put(`${API_URL}${config.endpoint}/${itemData[config.primaryKey]}`, formValues);
                Toast.fire({ icon: 'success', title: isAdd ? 'Thêm thành công!' : 'Cập nhật thành công!' });
                loadEntity(currentEntityKey);
            } catch (error) { Swal.fire('Lỗi', error.response?.data?.error || error.message, 'error'); }
        }
    }

    function deleteRecord(id) {
        Swal.fire({ title: 'Bạn có chắc chắn muốn xóa?', text: `Dữ liệu mã [${id}] sẽ bị xóa!`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'Đồng ý xóa' }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    await axios.delete(`${API_URL}${schemaConfig[currentEntityKey].endpoint}/${id}`);
                    Toast.fire({ icon: 'success', title: 'Đã xóa dữ liệu!' });
                    loadEntity(currentEntityKey);
                } catch (error) { Swal.fire('Không thể xóa!', 'Lỗi: Khóa ngoại.', 'error'); }
            }
        });
    }

    function searchTable() {
        let input = document.getElementById("search-input").value.toLowerCase();
        document.querySelectorAll("#table-container tbody tr").forEach(row => {
            if(row.cells.length > 1) row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }

    document.getElementById('btn-add-new').addEventListener('click', () => showModal(true));

    function applyRole(adminMode) {
        isAdmin = adminMode;
        document.getElementById('lbl-admin').style.fontWeight = adminMode ? '700' : '400';
        document.getElementById('lbl-admin').style.color = adminMode ? '#007bff' : '#888';
        document.getElementById('lbl-nv').style.fontWeight = adminMode ? '400' : '700';
        document.getElementById('lbl-nv').style.color = adminMode ? '#888' : '#28a745';

        ADMIN_MENUS.forEach(key => {
            const li = document.getElementById(`li-${key}`);
            if (li) li.style.display = (!adminMode && !STAFF_MENUS.includes(key)) ? 'none' : '';
        });

        if (!adminMode && currentEntityKey && !STAFF_MENUS.includes(currentEntityKey)) {
            currentEntityKey = null;
            document.querySelectorAll('.nav-list a').forEach(el => el.classList.remove('active'));
            document.getElementById('page-title').innerText = 'Chào mừng';
            document.getElementById('table-container').innerHTML = `<div style="text-align:center; margin-top:60px;"><i class='bx bx-lock' style="font-size:48px; color:#e74c3c;"></i><p>Bạn không có quyền truy cập.</p></div>`;
        } else if (currentEntityKey) {
            loadEntity(currentEntityKey);
        }
    }

    document.getElementById('role-toggle').addEventListener('change', function () { applyRole(this.checked); });
</script>
